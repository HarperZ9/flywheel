<script>

  var CHARS_PER_TICK = 6, TICK_MS = 12, REVEAL_PAUSE_MS = 1400;
  var stepIndex = 0, charIndex = 0, playing = false, timer = null;

    var cmdSpan = document.createElement("span");
    cmdSpan.className = "cmd";
