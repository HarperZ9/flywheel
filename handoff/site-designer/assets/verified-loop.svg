<svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="Hanken Grotesk, ui-sans-serif, system-ui, sans-serif" role="img" aria-label="The verified-inference loop: propose with a local model, dispose with an external check, carry a content-addressed receipt; passes feed a proof cache, failures raise N or escalate to a named stronger tier.">
  <style>
    /* Design and Voice Canon: color only as a verdict. Verified green = accept
       path, drift iris = caution and failure edges. Ceramic ground, dark ink;
       a near-black dark counterpart. */
    :root{ --void:#f4f3ef; --bone:#0b0c0e; --ink-muted:#43474e;
      --hairline:rgba(11,12,14,.14); --verified:#1f7a52; --drift:#3a2bd6; }
    @media (prefers-color-scheme: dark){
      :root{ --void:#0b0e0f; --bone:#eef1ee; --ink-muted:#9aa39c;
        --hairline:rgba(238,241,238,.16); --verified:#5fae93; --drift:#a99cf5; } }
    .bg{ fill:var(--void); }
    .card{ fill:color-mix(in oklab, var(--void) 55%, transparent); stroke:var(--hairline); stroke-width:1.5; }
    .accentbox{ fill:color-mix(in oklab, var(--verified) 13%, transparent); stroke:var(--verified); stroke-width:1.5; }
    .t{ fill:var(--bone); font-size:15px; font-weight:650; }
    .s{ fill:var(--ink-muted); font-size:11.5px; }
    .cap{ fill:var(--drift); font-size:11px; font-weight:700; letter-spacing:.12em; }
    .title{ fill:var(--bone); font-size:20px; font-weight:700; }
    .loop{ stroke:var(--verified); stroke-width:2.4; fill:none; }
    .back{ stroke:var(--drift); stroke-width:2; fill:none; stroke-dasharray:5 4; }
    .okt{ fill:var(--verified); font-size:13px; font-weight:700; }
  </style>
  <rect class="bg" x="0" y="0" width="880" height="520"/>
  <marker id="la" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--verified)"/></marker>
  <marker id="lw" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--drift)"/></marker>
  <text class="cap" x="40" y="40">THE VERIFIED-INFERENCE LOOP</text>
  <text class="title" x="40" y="66">Propose cheap. Dispose external. Carry a re-checkable receipt.</text>
  <rect class="card" x="60" y="150" width="220" height="88" rx="14"/>
  <text class="cap" x="82" y="178">1 &#183; PROPOSE</text>
  <text class="t" x="82" y="200">Local model</text>
  <text class="s" x="82" y="219">cheap, replaceable; raise N</text>
  <text class="s" x="82" y="233">to widen the candidate pool</text>
  <rect class="accentbox" x="330" y="150" width="220" height="88" rx="14"/>
  <text class="cap" x="352" y="178">2 &#183; DISPOSE</text>
  <text class="t" x="352" y="200">External check</text>
  <text class="s" x="352" y="219">the only thing that accepts;</text>
  <text class="s" x="352" y="233">no learned model here</text>
  <rect class="card" x="600" y="150" width="220" height="88" rx="14" stroke="var(--verified)"/>
  <text class="cap" x="622" y="178" fill="var(--verified)">3 &#183; RECEIPT</text>
  <text class="t" x="622" y="200">Content-addressed</text>
  <text class="s" x="622" y="219">re-derive it offline; tamper</text>
  <text class="s" x="622" y="233">one byte and the check fails</text>
  <path class="loop" d="M280,194 L330,194" marker-end="url(#la)"/>
  <text class="s" x="288" y="186">candidates</text>
  <path class="loop" d="M550,194 L600,194" marker-end="url(#la)"/>
  <text class="okt" x="556" y="186">PASS</text>
  <rect class="card" x="600" y="300" width="220" height="66" rx="14"/>
  <text class="t" x="622" y="326">Proof cache</text>
  <text class="s" x="622" y="345">the next identical ask is free,</text>
  <text class="s" x="622" y="358">re-checked before it is served</text>
  <path class="loop" d="M710,238 L710,300" marker-end="url(#la)"/>
  <path class="back" d="M440,238 C440,300 240,300 175,300" marker-end="url(#lw)"/>
  <text class="cap" x="300" y="292" fill="var(--drift)">NO PASS &#183; RAISE N</text>
  <path class="back" d="M160,300 L160,238" marker-end="url(#lw)"/>
  <rect class="card" x="60" y="330" width="380" height="60" rx="14" stroke="var(--drift)"/>
  <text class="t" x="82" y="356" fill="var(--drift)">Budget spent below confidence &#8594; Escalate</text>
  <text class="s" x="82" y="374">route to a stronger tier; it is named, never called for you</text>
  <path class="back" d="M160,300 C160,318 200,322 230,330" marker-end="url(#lw)"/>
  <text class="s" x="40" y="470">An external check earns capability a model cannot self-select. Self-test earned nothing; the external check is the lever.</text>
  <text class="s" x="40" y="492">Every accepted answer, cached or fresh, carries the same receipt. The check can fail, which is what makes a pass mean something.</text>
</svg>
